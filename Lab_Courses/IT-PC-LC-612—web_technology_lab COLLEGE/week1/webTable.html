<!--
Design a web page containing the following invoice table:

Invoice Table Layout

---------------------------------------------------------
| Sl. No. | Item      | Quantity | Rate | Price         |
---------------------------------------------------------
| 1       | Book      | 2        | 150  | 300           |
| 2       | Pen       | 10       | 10   | 100           |
| 3       | Note Pad  | 10       | 40   | 400           |
| 4       | Pencil    | 5        | 30   | 150           |
---------------------------------------------------------
|                     Sub Total           | 950         |
---------------------------------------------------------
| Tax                                                    |
|                     CGST 12%           | 114           |
|                     SGST 12%           | 114           |
---------------------------------------------------------
|                     Total              | 1178          |
---------------------------------------------------------
-->
<html>
<head>
    <title>Invoice Table</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h2>Invoice Table</h2>
    <table>
        <tr>
            <th>Sl. No.</th>
            <th>Item</th>
            <th>Quantity</th>
            <th>Rate</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Book</td>
            <td>2</td>
            <td>150</td>
            <td>300</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Pen</td>
            <td>10</td>
            <td>10</td>
            <td>100</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Note Pad</td>
            <td>10</td>
            <td>40</td>
            <td>400</td>
        </tr>
        <tr>    
            <td>4</td>
            <td>Pencil</td>
            <td>5</td>
            <td>30</td>
            <td>150</td>
        </tr>
        <tr>    
            <td colspan="4">Sub Total</td>
            <td>950</td>
        </tr>
        <tr>
            <td colspan="4">CGST 12%</td>
            <td>114</td>
        </tr>
        <tr>
            <td colspan="4">SGST 12%</td>
            <td>114</td>
        </tr>
        <tr>
            <td colspan="4">Total</td>
            <td>1178</td>
        </tr>
    </table>
</body>
</html>
