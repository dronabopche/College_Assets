<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
</head>
<body>

<form onsubmit="return validate()">
    Name: <input type="text" 
        onfocus="focusMsg()" 
        onblur="blurMsg()"><br><br>

    <div onmouseover="over()" onmouseout="out()" 
         style="width:200px;height:100px;background:lightgray;">
        Hover over me
    </div><br>

    <input type="submit">
</form>

<script>
function focusMsg() {
    alert("Input focused");
}

function blurMsg() {
    alert("Input lost focus");
}

function over() {
    alert("Mouse over");
}

function out() {
    alert("Mouse out");
}

function validate() {
    alert("Form submitted");
    return true;
}
</script>

</body>
</html>
